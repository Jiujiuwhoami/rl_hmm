name: Test and Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run simple import test
      run: |
        python -c "import rl_hmm; print('Import successful:', rl_hmm.__version__)"
        python -c "from rl_hmm import Config, FeatureEngineer, FeatureRegistry; print('Components loaded')"

    - name: Build package (dry run)
      run: |
        pip install build
        python -m build --sdist --outdir /tmp/build_test
